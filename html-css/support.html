<!DOCTYPE html>
<html>
<head>
<title>Purrfect IT Solutions</title>

<style>

body{
    text-align:center;
    font-family:Arial;
    font-size: x-large;
    background-color: rgb(86, 220, 220) ;
}

#loading{
    display:none;
    font-size:20px;
    margin-top:20px;
}

</style>

</head>

<body>

<h1>Purrfect IT Solutions</h1>
<p>Tech support run entirely by cats 🐱</p>

<h3>Submit a Support Ticket</h3>

<form onsubmit="generateAdvice(); return false;">
<input type="text" placeholder="Enter your problem" required>
<br><br>
<button type="submit">Submit</button>
</form>

<p id="loading">Cat technician is checking your issue... 🐾</p>

<p id="advice"></p>

<br><br>

<button onclick="openExpert()">Summon Cat Expert 🐱</button>

<script>

var responses = [
"Have you tried sitting on the keyboard?",
"Please unplug the universe and plug it back in.",
"Did you feed the server tuna?",
"Press random keys until something works.",
"Ask the nearest cat for technical assistance."
];

function generateAdvice(){

document.getElementById("loading").style.display = "block";
document.getElementById("advice").innerHTML = "";

setTimeout(function(){

document.getElementById("loading").style.display = "none";

var random = responses[Math.floor(Math.random()*responses.length)];

document.getElementById("advice").innerHTML = random;

},2000);

}

function openExpert(){

window.location.href = "expert.html";

}

</script>

</body>
</html>
